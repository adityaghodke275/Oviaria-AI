<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Oviaria AI Register
    </title>

    <link
        rel="stylesheet"
        href="css/register.css"
    >

</head>

<body>

<div class="page-wrapper">

    <div class="header-section">

        <h1 class="page-title">
            Create Your Oviaria AI Account
        </h1>

        <p class="page-subtitle">
            Join Oviaria AI and receive personalized PCOD/PCOS risk assessment and healthcare recommendations.
        </p>

    </div>

    <div class="register-card">

        <img
            src="assets/logo.png"
            alt="Logo"
            class="logo"
        >

        <h2>
            Create Account
        </h2>

        <p class="subtitle">
            Begin your personalized women's healthcare journey
        </p>

        <form id="registerForm">

            <div class="input-grid">

                <div>

                    <label>
                        Full Name
                    </label>

                    <input
                        type="text"
                        id="fullName"
                        required
                    >

                </div>

                <div>

                    <label>
                        Email Address
                    </label>

                    <input
                        type="email"
                        id="email"
                        required
                    >

                </div>

                <div>

                    <label>
                        Password
                    </label>

                    <input
                        type="password"
                        id="password"
                        required
                    >

                </div>

                <div>

                    <label>
                        Confirm Password
                    </label>

                    <input
                        type="password"
                        id="confirmPassword"
                        required
                    >

                </div>

            </div>

            <button
                type="submit"
                class="register-btn"
            >
                Create Account
            </button>

        </form>

        <div class="signin-link">

            Already have an account?

            <a href="Login.html">
                Sign In
            </a>

        </div>

        <div class="secure-text">

            🔒 Your healthcare information is securely protected

        </div>

    </div>

</div>

<script type="module" src="js/register.js"></script>

</body>

</html>
