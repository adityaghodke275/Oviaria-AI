<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oviaria AI Login</title>

    <link rel="stylesheet" href="css/index.css">
</head>

<body>

    <div class="container">

        <!-- LEFT SECTION -->

        <div class="left-panel">

            <h1>
                Oviaria AI
            </h1>

            <h2>
                Predict & Personalize
                PCOD/PCOS Care
            </h2>

            <img
                src="assets/uterus-ai.png"
                alt="AI Uterus Illustration"
                class="hero-image"
            >

        </div>

        <!-- RIGHT SECTION -->

        <div class="right-panel">

            <div class="login-card">

                <img
                    src="assets/logo.png"
                    alt="Logo"
                    class="logo"
                >

                <h2>Welcome Back</h2>

                <p class="subtitle">
                    AI-Powered PCOD & PCOS Risk Assessment System
                </p>

                <form id="loginForm">

                    <input
                        type="email"
                        id="email"
                        placeholder="Email"
                        required
                    >

                    <input
                        type="password"
                        id="password"
                        placeholder="Password"
                        required
                    >

                    <div class="options">

                        <label>
                            <input type="checkbox">
                            Remember Me
                        </label>

                        <a href="#">
                            Forgot Password?
                        </a>

                    </div>

                    <button type="submit">
                        Sign In
                    </button>

                </form>

                <p class="register-text">

                    Don't have an account?

                    <a href="register.html">
                        Register Account
                    </a>

                </p>

                <p class="secure-text">
                    Your health data is securely protected
                </p>

            </div>

        </div>

    </div>

  <script type="module" src="js/index.js"></script>
  
</body>

</html>
